name: Deploy to pi02-reader

on:
  push:
    branches:
      - main
      - hacs-integration

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code on pi02-reader
        run: |
          ssh -o StrictHostKeyChecking=no david@pi02-reader \
            'cd ~/pi-dumb2smart-ir && git pull && pip3 install -r requirements.txt --break-system-packages && sudo systemctl restart ir-mqtt-bridge'