name: Release

on:
  workflow_run:
    workflows: ["Hassfest"]
    types: [completed]
    branches: [main]

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify HACS Action also succeeded for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          for attempt in $(seq 1 60); do
            CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/workflows/hacs.yml/runs?head_sha=$COMMIT_SHA" --jq '.workflow_runs[0].conclusion // "none"')
            STATUS=$(gh api "repos/${{ github.repository }}/actions/workflows/hacs.yml/runs?head_sha=$COMMIT_SHA" --jq '.workflow_runs[0].status // "none"')
            echo "Attempt $attempt: HACS Action status=$STATUS conclusion=$CONCLUSION"
            if [ "$CONCLUSION" = "success" ]; then
              exit 0
            fi
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
              echo "HACS Action did not succeed (conclusion=$CONCLUSION) — aborting release"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for HACS Action"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          AUTO_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/ir_remote/manifest.json'))['version'])")
          MANIFEST_TAG="v${MANIFEST_VERSION}"
          TAG=$(printf '%s\n%s\n' "$AUTO_TAG" "$MANIFEST_TAG" | sort -V | tail -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Get release notes from commit body
        id: notes
        run: |
          BODY=$(git log -1 --format='%b' "${{ github.event.workflow_run.head_sha }}")
          SUBJECT=$(git log -1 --format='%s' "${{ github.event.workflow_run.head_sha }}")
          NOTES="${BODY:-$SUBJECT}"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Bump manifest.json version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.number }}"/' custom_components/ir_remote/manifest.json
          git add custom_components/ir_remote/manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.number }} [skip ci]"
          git push

      - name: Tag and release
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}