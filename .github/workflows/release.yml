name: Release

on:
  push:
    branches:
      - main

jobs:
  hacs:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  release:
    needs: [hacs, hassfest]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          AUTO_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/ir_remote/manifest.json'))['version'])")
          MANIFEST_TAG="v${MANIFEST_VERSION}"
          TAG=$(printf '%s\n%s\n' "$AUTO_TAG" "$MANIFEST_TAG" | sort -V | tail -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Get release notes from commit body
        id: notes
        run: |
          BODY=$(git log -1 --format='%b')
          SUBJECT=$(git log -1 --format='%s')
          NOTES="${BODY:-$SUBJECT}"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Bump manifest.json version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.number }}"/' custom_components/ir_remote/manifest.json
          git add custom_components/ir_remote/manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.number }} [skip ci]"
          git push

      - name: Tag and release
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
