record_key:
  name: Record IR Key
  description: Put the bridge into recording mode for a new IR key. Point your remote at the Pi and press the button within 30 seconds.
  fields:
    device:
      name: Device
      description: Device name (e.g. samsung)
      required: true
      selector:
        text:
    key:
      name: Key name
      description: Name for the new key (e.g. power, volume_up)
      required: true
      selector:
        text:
    topic_prefix:
      name: MQTT topic prefix
      description: Prefix of the target bridge (e.g. ir_remote_amp). Defaults to ir_remote. Must match the prefix in /etc/ir-bridge/env on the Pi Zero.
      required: false
      default: ir_remote
      selector:
        text:

delete_key:
  name: Delete IR Key
  description: Permanently delete an IR key from a device.
  fields:
    device:
      name: Device
      description: Device name (e.g. samsung)
      required: true
      selector:
        text:
    key:
      name: Key name
      description: Name of the key to delete
      required: true
      selector:
        text:
    topic_prefix:
      name: MQTT topic prefix
      description: Prefix of the target bridge (e.g. ir_remote_amp). Defaults to ir_remote. Must match the prefix in /etc/ir-bridge/env on the Pi Zero.
      required: false
      default: ir_remote
      selector:
        text:

rename_key:
  name: Rename IR Key
  description: Rename an existing IR key.
  fields:
    device:
      name: Device
      description: Device name (e.g. samsung)
      required: true
      selector:
        text:
    old_key:
      name: Current name
      description: Current key name
      required: true
      selector:
        text:
    new_key:
      name: New name
      description: New key name
      required: true
      selector:
        text:
    topic_prefix:
      name: MQTT topic prefix
      description: Prefix of the target bridge (e.g. ir_remote_amp). Defaults to ir_remote. Must match the prefix in /etc/ir-bridge/env on the Pi Zero.
      required: false
      default: ir_remote
      selector:
        text:
