<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>

  <!-- Remote body -->
  <rect x="168" y="96" width="176" height="320" rx="48" fill="#2d2d4e" stroke="#4a4a7a" stroke-width="6"/>

  <!-- IR emitter dot -->
  <circle cx="256" cy="140" r="10" fill="#ff9800"/>

  <!-- Power button -->
  <circle cx="256" cy="210" r="30" fill="none" stroke="#e040fb" stroke-width="7"/>
  <line x1="256" y1="182" x2="256" y2="202" stroke="#e040fb" stroke-width="7" stroke-linecap="round"/>

  <!-- D-pad -->
  <circle cx="256" cy="306" r="36" fill="#3a3a5e"/>
  <polygon points="256,274 244,294 268,294" fill="#90caf9"/>
  <polygon points="256,338 244,318 268,318" fill="#90caf9"/>
  <polygon points="220,306 240,294 240,318" fill="#90caf9"/>
  <polygon points="292,306 272,294 272,318" fill="#90caf9"/>
  <circle cx="256" cy="306" r="10" fill="#5c5c8a"/>

  <!-- Bottom buttons -->
  <circle cx="222" cy="376" r="12" fill="#4caf50"/>
  <circle cx="256" cy="376" r="12" fill="#f44336"/>
  <circle cx="290" cy="376" r="12" fill="#2196f3"/>
</svg>
